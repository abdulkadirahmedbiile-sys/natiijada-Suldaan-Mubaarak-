            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 {
            color: #1a365d;
            margin-bottom: 5px;
            font-size: 22px;
        }
        h3 {
            color: #4a5568;
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 7px;
            color: #4a5568;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #1a365d;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a365d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            display: none;
            text-align: left;
        }
        .error {
            background-color: #fed7d7;
            color: #9b2c2c;
            border-left: 5px solid #e53e3e;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .success {
            background-color: #f7fafc;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-top: 4px solid #1a365d;
        }
        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a365d;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
            text-align: center;
        }
        #step1, #step2 {
            display: none;
        }
        #step1 {
            display: block;
        }

    let authenticatedStudent = null;

    function goToStep2() {
        const usernameInput = document.getElementById("username").value.trim();
        const passwordInput = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("error-message");

        errorDiv.style.display = "none";
        errorDiv.innerHTML = "";

        if (usernameInput === "" || passwordInput === "") {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Fadlan buuxi Username iyo Password.";
            return;
        }

        let found = false;
        for (let rollNo in studentsData) {
            if (studentsData[rollNo].username === usernameInput && studentsData[rollNo].password === passwordInput) {
                authenticatedStudent = studentsData[rollNo];
                authenticatedStudent.rollNo = rollNo;
                found = true;
                break;
            }
        }

        if (found) {
            document.getElementById("step1").style.display = "none";
            document.getElementById("step2").style.display = "block";
        } else {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Username ama Password khaldan!";
        }
    }

    function checkResult() {
        const idInput = document.getElementById("studentId").value.trim().toUpperCase();
        const resultDiv = document.getElementById("result");
        const errorDiv = document.getElementById("error-message");
        
        resultDiv.style.display = "none";
        resultDiv.className = "result-box";
        resultDiv.innerHTML = "";
        errorDiv.style.display = "none";

        if (idInput === "") {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Fadlan geli Roll No.";
            return;
        }

        if (idInput === authenticatedStudent.rollNo) {
            if (authenticatedStudent.hasDebt) {
                resultDiv.style.display = "block";
                resultDiv.classList.add("error");
                resultDiv.innerHTML = "FADLAN ISKA BIXI LACAGTA KUGU TAAGAN.";
            } else {
                resultDiv.style.display = "block";
                resultDiv.classList.add("success");
                resultDiv.innerHTML = `

                        <strong>Fasalka:</strong> ${authenticatedStudent.class}<br>

                        <strong>Status:</strong> <span style="color: green; font-weight: bold;">${authenticatedStudent.status}</span>
                    </div>

                        • Physics: ${authenticatedStudent.phy}<br>
