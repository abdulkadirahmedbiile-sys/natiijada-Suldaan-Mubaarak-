<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIILE EXAMINATION BOARD (BEB)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 {
            color: #1a365d;
            margin-bottom: 5px;
            font-size: 22px;
        }
        h3 {
            color: #4a5568;
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 7px;
            color: #4a5568;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #1a365d;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a365d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            display: none;
            text-align: left;
        }
        .error {
            background-color: #fed7d7;
            color: #9b2c2c;
            border-left: 5px solid #e53e3e;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .success {
            background-color: #f7fafc;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-top: 4px solid #1a365d;
        }
        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a365d;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
            text-align: center;
        }
        #step1, #step2 {
            display: none;
        }
        #step1 {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Logo.jpeg" alt="BEB Logo" class="logo">
    
    <h2>BIILE EXAMINATION BOARD</h2>
    <h3>(BEB)</h3>

    <div id="error-message" class="result-box error"></div>

    <!-- BOGGA 1aad: LOGIN -->
    <div id="step1">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Geli Username-kaaga">
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Geli Password-kaaga">
        </div>

        <button onclick="goToStep2()">NEXT</button>
    </div>

    <!-- BOGGA 2aad: NATIIJO RAADIN -->
    <div id="step2">
        <div class="form-group">
            <label for="studentId">Geli Roll No kaaga:</label>
            <input type="text" id="studentId" placeholder="Tusaale: SM260010...">
        </div>

        <button onclick="checkResult()">Hel Natiijadaada</button>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    // Kaliya 3da arday ee ugu horreysa ayaa halkan ku jira hadda
    const studentsData = {
        "SM26001000": { username: "student1", password: "pass123", name: "LAMA YAQAANO", school: "SULDAN MUBARIK HIGH SCHOOL", class: "LAMA YAQAANO", islam: 100, arabi: 100, phy: 92, math: 81, som: 100, bio: 95, chem: 96, ict: 97, eng: 98, geo: 100, his: 100, total: 1059, avg: "96.27", grade: "A+", status: "PASS", admin: "ENG.AHMED BIILE", hasDebt: false },
        "SM26001030": { username: "student2", password: "pass123", name: "LAMA YAQAANO", school: "SULDAN MUBARIK HIGH SCHOOL", class: "LAMA YAQAANO", islam: 100, arabi: 96, phy: 100, math: 94, som: 96, bio: 90, chem: 95, ict: 100, eng: 90, geo: 99, his: 93, total: 1053, avg: "95.73", grade: "A+", status: "PASS", admin: "ENG.AHMED BIILE", hasDebt: false },
        "SM26001002": { username: "student3", password: "pass123", name: "LAMA YAQAANO", school: "SULDAN MUBARIK HIGH SCHOOL", class: "LAMA YAQAANO", islam: 92, arabi: 96, phy: 68, math: 60, som: 100, bio: 70, chem: 90, ict: 93, eng: 95, geo: 92, his: 93, total: 949, avg: "86.27", grade: "A", status: "PASS", admin: "ENG.AHMED BIILE", hasDebt: true }
    };

    let authenticatedStudent = null;

    function goToStep2() {
        const usernameInput = document.getElementById("username").value.trim();
        const passwordInput = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("error-message");

        errorDiv.style.display = "none";
        errorDiv.innerHTML = "";

        if (usernameInput === "" || passwordInput === "") {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Fadlan buuxi Username iyo Password.";
            return;
        }

        let found = false;
        for (let rollNo in studentsData) {
            if (studentsData[rollNo].username === usernameInput && studentsData[rollNo].password === passwordInput) {
                authenticatedStudent = studentsData[rollNo];
                authenticatedStudent.rollNo = rollNo;
                found = true;
                break;
            }
        }

        if (found) {
            document.getElementById("step1").style.display = "none";
            document.getElementById("step2").style.display = "block";
        } else {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Username ama Password khaldan!";
        }
    }

    function checkResult() {
        const idInput = document.getElementById("studentId").value.trim().toUpperCase();
        const resultDiv = document.getElementById("result");
        const errorDiv = document.getElementById("error-message");
        
        resultDiv.style.display = "none";
        resultDiv.className = "result-box";
        resultDiv.innerHTML = "";
        errorDiv.style.display = "none";

        if (idInput === "") {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Fadlan geli Roll No.";
            return;
        }

        if (idInput === authenticatedStudent.rollNo) {
            if (authenticatedStudent.hasDebt) {
                resultDiv.style.display = "block";
                resultDiv.classList.add("error");
                resultDiv.innerHTML = "FADLAN ISKA BIXI LACAGTA KUGU TAAGAN.";
            } else {
                resultDiv.style.display = "block";
                resultDiv.classList.add("success");
                resultDiv.innerHTML = `
                    <div class="result-title">NATIIJADA ARDAYGA</div>
                    
                    <div style="background: #edf2f7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px;">
                        <strong>Magaca:</strong> ${authenticatedStudent.name}<br>
                        <strong>Iskuulka:</strong> ${authenticatedStudent.school}<br>
                        <strong>Fasalka:</strong> ${authenticatedStudent.class}<br>
                        <strong>Celcelis (Avg):</strong> ${authenticatedStudent.avg}% | <strong>Grade:</strong> ${authenticatedStudent.grade}<br>
                        <strong>Status:</strong> <span style="color: green; font-weight: bold;">${authenticatedStudent.status}</span>
                    </div>
                    
                    <div style="font-size: 14px; line-height: 1.6;">
                        • Islam: ${authenticatedStudent.islam}<br>
                        • Arabi: ${authenticatedStudent.arabi}<br>
                        • Physics: ${authenticatedStudent.phy}<br>
                        • Maths: ${authenticatedStudent.math}<br>
                        • Somali: ${authenticatedStudent.som}<br>
                        • Biology: ${authenticatedStudent.bio}<br>
                        • Chemistry: ${authenticatedStudent.chem}<br>
                        • ICT: ${authenticatedStudent.ict}<br>
                        • English: ${authenticatedStudent.eng}<br>
                        • Geography: ${authenticatedStudent.geo}<br>
                        • History: ${authenticatedStudent.his}<br>
                        <hr style="margin: 10px 0; border: 0; border-top: 1px solid #cbd5e0;">
                        <strong>Total Score:</strong> ${authenticatedStudent.total}<br>
                        <strong>Maamulaha:</strong> ${authenticatedStudent.admin}
                    </div>
                `;
            }
        } else {
            errorDiv.style.display = "block";
            errorDiv.innerHTML = "Roll No-gaan kuma jiro akoonkaaga! Fadlan geli Roll No-gaaga saxda ah.";
        }
    }
</script>

</body>
</html>
