<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIILE NATIONAL EXAMINATION BOARD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 100px;
            height: auto;
        }
        h1 {
            font-size: 18px;
            color: #1a365d;
            margin: 10px 0;
        }
        h2 {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 25px;
        }
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
            text-align: center;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        #error {
            background-color: #fed7d7;
            color: #9b2c2c;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
        #result {
            margin-top: 25px;
            border-top: 2px dashed #e2e8f0;
            padding-top: 20px;
            text-align: left;
            display: none;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .result-label {
            font-weight: bold;
            color: #4a5568;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            background-color: #48bb78;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo.jpeg" alt="Logo">
    </div>

    <h1>BIILE NATIONAL EXAMINATION BOARD BNEB (YAKA SCHOOL)</h1>
    <h2>Academic Year: 2025 - 2026</h2>

    <div class="search-box">
        <input type="text" id="rollNo" placeholder="GELI ROLL NUMBER-KAAGA...">
        <button onclick="searchResult()">RAADI NATIIJADA</button>
    </div>

    <div id="error"></div>

    <div id="result">
        <div class="result-item"><span class="result-label">Magaca:</span> <span id="rName"></span></div>
        <div class="result-item"><span class="result-label">Roll No:</span> <span id="rRoll"></span></div>
        <div class="result-item"><span class="result-label">Total Marks:</span> <span id="rTotal"></span></div>
        <div class="result-item"><span class="result-label">Average:</span> <span id="rAvg"></span></div>
        <div class="result-item"><span class="result-label">Grade:</span> <span id="rGrade"></span></div>
        <div class="result-item"><span class="result-label">Status:</span> <span id="rStatus" class="badge"></span></div>
    </div>
</div>

function searchResult() {
    const input = document.getElementById('rollNo').value.trim().toUpperCase();
    const resBox = document.getElementById('result');
    const errBox = document.getElementById('error');
    
    errBox.style.display = "none";
    resBox.style.display = "none";
    
    if(!input) { 
        alert("Fadlan qor Roll Number-ka!"); 
        return; 
    }

    const student = ardaydaXogta[input];

    if(student) {
        if (student.isPaid === false) {
            errBox.style.display = "block";
            errBox.innerText = "Fadlan iska bixi lacagta lagugu leeyahay!";
            return;
        }

        document.getElementById('rName').innerText = student.name;
        document.getElementById('rRoll').innerText = input;
        document.getElementById('rTotal').innerText = student.total;
        document.getElementById('rAvg').innerText = student.avg;
        document.getElementById('rGrade').innerText = student.grade;
        document.getElementById('rStatus').innerText = student.status;
        
        resBox.style.display = "block";
    } else {
        errBox.innerText = "Roll Number-kaas waa khalad! Ka hubi kaarkaagii imtixaanka.";
        errBox.style.display = "block";
    }
}
